services:
  # The Brain - Python + Go (beans)
  kimi-agent:
    build: 
      context: .
      dockerfile: Dockerfile.kimi
    image: my-kimi-agent:latest
    volumes:
      - ..:/workspace:Z
      - ./kimi-config:/root/.config/kimi-cli:Z
    stdin_open: true
    tty: true
    networks:
      - mcp-net

  # MCP Gateway - runs supergateway on top of the official sequentialthinking image
  mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile.mcp-gateway
    image: mcp-gateway:latest
    ports:
      - "8080:8080"
    networks:
      - mcp-net


networks:
  mcp-net:

volumes:
  beans-data:
